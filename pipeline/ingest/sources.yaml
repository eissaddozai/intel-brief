# ═══════════════════════════════════════════════════════════════════════════════
# CSE INTEL BRIEF — SOURCE REGISTRY
# ═══════════════════════════════════════════════════════════════════════════════
#
# TIER DEFINITIONS
#   Tier 1 — Factual backbone. AP not reporting an event = event unconfirmed.
#             Items produce verification_status: "confirmed"
#   Tier 2 — Analytical depth. Interpretation, context, perspective.
#             Items produce verification_status: "reported"
#   Tier 3 — Domain-specific triggers. Pull only when trigger conditions are met.
#             Items produce verification_status: "claimed"
#
# METHOD VALUES: rss | scrape | email
#
# DOMAIN VALUES: d1=battlespace  d2=escalation  d3=energy  d4=diplomatic  d5=cyber
#
# HONEST STATUS NOTES
#   status: working   — confirmed functional as of 2026-03
#   status: likely    — URL is real; untested in this environment
#   status: paywall   — returns empty/login page; included for future cookie auth
#   status: removed   — source removed because URL was fabricated or dead
# ═══════════════════════════════════════════════════════════════════════════════

sources:

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 1 — FACTUAL BACKBONE
  # ─────────────────────────────────────────────────────────────────────────────

  - id: ap_wire
    name: "Associated Press"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: rss
    url: "https://feeds.apnews.com/rss/apf-intlnews"
    status: likely
    enabled: true
    notes: >
      Real AP RSS feed (international news). Not topic-filtered to Iran —
      triage keyword matching selects relevant items. AP not reporting an
      event = event unconfirmed. Factual floor for all claims.

  - id: al_jazeera_en
    name: "Al Jazeera English"
    tier: 1
    domains: [d1, d2, d4]
    method: rss
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    status: working
    enabled: true
    notes: >
      Reliable public RSS feed. Strong regional bureau coverage including
      Tehran, Beirut, Gaza, Riyadh. Cross-check against AP for casualty
      figures. Replaces the defunct Reuters public RSS feed.

  - id: ctpiw_evening
    name: "CTP-ISW Evening Report"
    tier: 1
    domains: [d1, d2]
    method: scrape
    url: "https://www.criticalthreats.org/analysis/iran-war-updates"
    status: likely
    enabled: true
    notes: >
      Primary backbone for Battlespace (d1). Every claim is footnoted.
      Scraped with requests+BS4 (no Playwright). Extracts article
      paragraphs from the Iran War Updates category page. The evening
      report covers the full 24h operational picture.

  - id: iaea
    name: "IAEA Statements"
    tier: 1
    domains: [d2]
    method: rss
    url: "https://www.iaea.org/feeds/topstories.xml"
    status: working
    enabled: true
    notes: >
      Definitive source for Iranian nuclear compliance and inspector access.
      New IAEA statement = mandatory inclusion regardless of novelty filter.

  - id: centcom
    name: "CENTCOM Press Releases"
    tier: 1
    domains: [d1]
    method: scrape
    url: "https://www.centcom.mil/MEDIA/NEWS-ARTICLES/"
    status: likely
    enabled: true
    notes: >
      US government site — static HTML, no JS rendering needed.
      Official floor for US strikes, force posture, US casualty figures.
      Scraped with requests+BS4, extracts article titles and links.

  - id: ukmto
    name: "UKMTO Maritime Bulletins"
    tier: 1
    domains: [d1, d3]
    method: scrape
    url: "https://www.ukmto.org/indian-ocean/recent-incidents"
    status: likely
    enabled: true
    notes: >
      No RSS feed exists. UK Maritime Trade Operations — definitive
      maritime incident record for Hormuz/Red Sea/Gulf of Aden.
      Scraped with requests+BS4, extracts incident table rows.

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 2 — ANALYTICAL DEPTH
  # ─────────────────────────────────────────────────────────────────────────────

  - id: cfr_daily
    name: "CFR Daily News Brief"
    tier: 2
    domains: [d4]
    method: email
    schedule_hint: "06:00 ET"
    enabled: true
    notes: >
      Subscribe at cfr.org/daily-news-brief. Forward to monitored inbox
      configured under email.folder in pipeline-config.yaml.
      Best single input for Diplomatic domain (d4): UN, G7, multilateral.

  - id: ctpiw_morning
    name: "CTP-ISW Morning Report"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.criticalthreats.org/analysis/iran-war-updates"
    status: likely
    enabled: true
    notes: >
      Same URL as evening report — scraper extracts the most recent
      article. Lower priority; use for overnight events that predate
      the previous evening run.

  - id: icg
    name: "International Crisis Group"
    tier: 2
    domains: [d2, d4]
    method: rss
    url: "https://www.crisisgroup.org/rss.xml"
    status: likely
    enabled: true
    notes: >
      Ali Vaez escalation framing. Best public voice on Iranian political
      economy and decision-making calculus. Use for dissenting/restraint
      framing in d2 assessments.

  - id: france24_en
    name: "France 24 English"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://www.france24.com/en/rss"
    status: working
    enabled: true
    notes: "EU Council dynamics, French government positioning."

  - id: france24_observers
    name: "France 24 Observers"
    tier: 2
    domains: [d2, d5]
    method: rss
    url: "https://observers.france24.com/en/rss"
    status: likely
    enabled: true
    notes: "Video authentication unit for hacktivist claims and escalation imagery."

  - id: rfi_en
    name: "RFI English"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://www.rfi.fr/en/rss"
    status: likely
    enabled: true

  - id: rfi_persian
    name: "RFI Persian"
    tier: 2
    domains: [d1, d2]
    method: rss
    url: "https://www.rfi.fr/fa/rss"
    status: likely
    enabled: true
    notes: >
      Persian-language. Primary inside-Iran supplement during blackout
      periods. Items flagged with lang=fa for downstream handling.

  - id: dw_en
    name: "Deutsche Welle"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://rss.dw.com/rdf/rss-en-all"
    status: working
    enabled: true
    notes: "Russian and Chinese diplomatic positioning. NATO implications."

  - id: bbc_mideast
    name: "BBC Middle East"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://feeds.bbci.co.uk/news/world/middle_east/rss.xml"
    status: working
    enabled: true

  - id: anadolu
    name: "Anadolu Agency"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://www.aa.com.tr/en/rss/default?cat=world"
    status: likely
    enabled: true
    notes: "Turkish positioning, Caucasus/northern flank, Tehran bureau."

  - id: rudaw
    name: "Rudaw"
    tier: 2
    domains: [d1]
    method: rss
    url: "https://www.rudaw.net/english/rss.xml"
    status: likely
    enabled: true
    notes: "Ground coverage of Kurdistan Region of Iraq. Proxy activity in northern Iraq."

  - id: quincy_inst
    name: "Responsible Statecraft"
    tier: 2
    domains: [d2]
    method: rss
    url: "https://responsiblestatecraft.org/feed/"
    status: likely
    enabled: true
    notes: "Restraint framing. Include to prevent hawkish-framing default."

  - id: alma_research
    name: "Alma Research"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://israel-alma.org/category/reports/"
    status: likely
    enabled: true
    notes: >
      IDF-side operational depth. Best public source on northern front
      (Hezbollah) order of battle. WordPress category page — scraped
      with requests+BS4, extracts article excerpts.

  - id: iran_intl
    name: "Iran International"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.iranintl.com/en"
    status: likely
    enabled: true
    notes: >
      Inside-Iran footage and IRGC internal dynamics. Homepage scrape
      with requests+BS4. May be partially JS-rendered; extracts whatever
      static HTML is available (headlines + meta descriptions).

  - id: bbc_persian
    name: "BBC Persian"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.bbc.com/persian"
    status: likely
    enabled: true
    notes: "Persian-language BBC. Extracts headline text from static homepage HTML."

  - id: haaretz
    name: "Haaretz"
    tier: 2
    domains: [d1, d4]
    method: scrape
    url: "https://www.haaretz.com/middle-east-news"
    status: paywall
    enabled: false
    notes: >
      Hard paywall. Returns login page without auth cookies. Disabled
      until cookie authentication is implemented. Essential for
      war-cabinet dissent and IDF internal disputes when accessible.

  # NOTE: CNN/CNBC/NBC/CBS live blog sources removed.
  # The date-interpolated URL patterns (e.g. cnn.com/world/live-news/iran-war-{YYYY-MM-DD})
  # were invented — these URL formats don't exist on those sites.
  # Replaced by RSS feeds from AP, Al Jazeera, BBC, DW, France 24.

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 3 — DOMAIN-SPECIFIC TRIGGERS
  # ─────────────────────────────────────────────────────────────────────────────

  - id: recorded_future
    name: "Recorded Future Research Blog"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.recordedfuture.com/research/feed"
    trigger: cyber_activity
    status: likely
    enabled: true
    notes: "Threat intel reports. Pull only on new publication."

  - id: cisa_advisories
    name: "CISA Cybersecurity Advisories"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
    trigger: cyber_activity
    status: working
    enabled: true
    notes: "US government advisories. Attribution-grade claims only."

  - id: mandiant_blog
    name: "Mandiant / Google Threat Intel"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.mandiant.com/resources/blog/rss.xml"
    trigger: cyber_activity
    status: likely
    enabled: true
    notes: "Iranian APT attribution. Treat as 'reported' not 'confirmed'."

  - id: netblocks
    name: "NetBlocks Internet Observatory"
    tier: 3
    domains: [d5]
    method: scrape
    url: "https://netblocks.org"
    trigger: cyber_activity
    status: likely
    enabled: true
    notes: >
      Iran internet shutdown/throttling status. Pull daily; include only
      when status changes. A blackout event = mandatory inclusion.

  - id: eia_weekly
    name: "EIA Weekly Petroleum Status"
    tier: 3
    domains: [d3]
    method: scrape
    url: "https://www.eia.gov/petroleum/supply/weekly/"
    trigger: energy_disruption
    schedule_hint: "Wednesday 10:30 ET"
    status: likely
    enabled: true
    notes: "US petroleum stockpile report. Trigger if Brent moves >5% in 24h."

  - id: opec_statements
    name: "OPEC Press Releases"
    tier: 3
    domains: [d3]
    method: scrape
    url: "https://www.opec.org/opec_web/en/press_room/4567.htm"
    trigger: energy_disruption
    status: likely
    enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# REMOVED SOURCES (documented so they are not re-added accidentally)
# ─────────────────────────────────────────────────────────────────────────────
# reuters_mideast — feeds.reuters.com/reuters/worldNews — Reuters removed all
#   public RSS feeds in 2020. URL 404s. Replaced by Al Jazeera English RSS.
#
# cnn_live  — cnn.com/world/live-news/iran-war-{YYYY-MM-DD}
# cnbc_live — cnbc.com/iran-war-live-updates-{YYYY-MM-DD}
# nbc_live  — nbcnews.com/world/iran/live-blog-{YYYY-MM-DD}
# cbs_live  — cbsnews.com/live-updates/iran-war-{YYYY-MM-DD}
#   All four: fabricated URL patterns. These specific slugs do not exist.
#   Re-add if/when these outlets publish predictable daily live blog URLs.
#
# al_jazeera_tracker — aljazeera.com/news/liveblog/iran-war-casualty-tracker
#   Speculative URL. AJ casualty tracker URLs are campaign-specific and
#   unpredictable. Use AJ English RSS (al_jazeera_en) instead.
#
# kpler_blog — kpler.com/blog
#   JS-rendered, returns blank page without Playwright. Disabled.
#   Re-enable if Kpler publishes an RSS feed or API access is configured.

# ─────────────────────────────────────────────────────────────────────────────
# EXCLUDED SOURCES
# ─────────────────────────────────────────────────────────────────────────────

excluded:
  state_media_iranian:
    names:
      - "Tehran Times"
      - "PressTV"
      - "IRNA (Islamic Republic News Agency)"
      - "Mehr News Agency"
      - "Fars News Agency"
      - "Tasnim News Agency"
    policy: "Label as 'Iranian government asserts...' — never use as independent factual corroboration."

  raw_osint:
    names:
      - "Raw Twitter/X OSINT accounts (unvetted)"
      - "Telegram channels without editorial accountability"
    policy: "Do not ingest raw social media. France 24 Observers performs verification."

  policy_advocacy:
    names:
      - "Foundation for Defense of Democracies (FDD)"
      - "Long War Journal"
    policy: "Event tracking usable as Tier 3 with hedging. Do not import policy recommendations."
