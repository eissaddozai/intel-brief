# ═══════════════════════════════════════════════════════════════════════════════
# CSE INTEL BRIEF — SOURCE REGISTRY
# ═══════════════════════════════════════════════════════════════════════════════
#
# TIER DEFINITIONS
#   Tier 1 — Factual backbone. AP not reporting an event = event unconfirmed.
#             Items produce verification_status: "confirmed"
#   Tier 2 — Analytical depth. Interpretation, context, perspective.
#             Items produce verification_status: "reported"
#   Tier 3 — Domain-specific triggers. Pull only when conditions are met.
#             Items produce verification_status: "claimed"
#
# METHOD VALUES: rss | scrape | email
#
# DOMAIN VALUES: d1=battlespace  d2=escalation  d3=energy  d4=diplomatic  d5=cyber
# ═══════════════════════════════════════════════════════════════════════════════

sources:

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 1 — FACTUAL BACKBONE
  # ─────────────────────────────────────────────────────────────────────────────

  - id: ap_wire
    name: "Associated Press"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: rss
    url: "https://rsshub.app/apnews/topics/iran-war"
    fallback_url: "https://feeds.apnews.com/rss/apf-intlnews"
    enabled: true
    notes: >
      Factual floor for all event claims. AP not reporting = unconfirmed.
      If AP and Reuters both silent, mark all other sources as unverified.

  - id: reuters_mideast
    name: "Reuters Middle East"
    tier: 1
    domains: [d1, d2, d3, d4]
    method: rss
    url: "https://feeds.reuters.com/reuters/worldNews"
    enabled: true
    notes: "Secondary factual backbone. Cross-check AP for casualty figures."

  - id: afp_france24
    name: "AFP via France 24"
    tier: 1
    domains: [d1, d4]
    method: rss
    url: "https://www.france24.com/en/rss"
    enabled: true
    notes: >
      AFP wire via France 24 aggregator. Good for European diplomatic positioning
      and French government statements. Supplementary to AP/Reuters for kinetics.

  - id: ctpiw_evening
    name: "CTP-ISW Evening Report"
    tier: 1
    domains: [d1, d2]
    method: scrape
    url: "https://www.criticalthreats.org/analysis/iran-war-updates"
    schedule_hint: "18:30 ET"
    enabled: true
    notes: >
      Primary backbone for Battlespace (d1). Every claim is footnoted to
      original sources. The evening report covers the full 24h operational
      picture. Do not treat morning report as equivalent quality.

  - id: iaea
    name: "IAEA Statements"
    tier: 1
    domains: [d2]
    method: rss
    url: "https://www.iaea.org/feeds/topstories.xml"
    enabled: true
    notes: >
      Definitive source for Iranian nuclear compliance and inspector access.
      New IAEA statement = mandatory inclusion regardless of novelty filter.

  - id: centcom
    name: "CENTCOM Press Releases"
    tier: 1
    domains: [d1]
    method: scrape
    url: "https://www.centcom.mil/MEDIA/NEWS-ARTICLES/"
    enabled: true
    notes: >
      Official floor for US strikes, force posture, and US casualty figures.
      CENTCOM claims are 'confirmed' for US actions only — Israeli figures
      come from IDF and are 'reported'.

  - id: ukmto
    name: "UKMTO Maritime Bulletins"
    tier: 1
    domains: [d3]
    method: scrape
    url: "https://www.ukmto.org/indian-ocean/recent-incidents"
    enabled: true
    notes: >
      No RSS feed. Definitive maritime incident record for Hormuz/Red Sea.
      Check daily for incident reports. Pull full incident table each run.

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 2 — ANALYTICAL DEPTH
  # ─────────────────────────────────────────────────────────────────────────────

  - id: cfr_daily
    name: "CFR Daily News Brief"
    tier: 2
    domains: [d4]
    method: email
    schedule_hint: "06:00 ET"
    enabled: true
    notes: >
      Subscribe at cfr.org/daily-news-brief. Forward to monitored inbox
      configured under email.folder in pipeline-config.yaml.
      Highest value input for Diplomatic domain (d4). Covers UN, G7,
      multilateral institutional positioning with editorial curation.

  - id: ctpiw_morning
    name: "CTP-ISW Morning Report"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.criticalthreats.org/analysis/iran-war-updates"
    schedule_hint: "05:30 ET"
    enabled: true
    notes: >
      Lower priority than evening report. Use for overnight events that
      predate the previous evening run. Flag if it contradicts evening report.

  - id: alma_research
    name: "Alma Research Daily"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://israel-alma.org/category/reports/"
    schedule_hint: "19:00 Israel time"
    enabled: true
    notes: >
      IDF-side operational depth. Best public source on Iranian missile
      inventory degradation and northern front (Hezbollah) order of battle.

  - id: icg
    name: "International Crisis Group"
    tier: 2
    domains: [d2, d4]
    method: rss
    url: "https://www.crisisgroup.org/rss.xml"
    enabled: true
    notes: >
      Ali Vaez escalation framing. Best public voice on Iranian political
      economy and decision-making calculus. Use for dissenting/restraint
      framing in d2 assessments.

  - id: cnn_live
    name: "CNN Live Blog"
    tier: 2
    domains: [d1, d4]
    method: scrape
    url: "https://www.cnn.com/world/live-news/iran-war-{YYYY-MM-DD}"
    enabled: true
    notes: >
      JS-rendered. Playwright required. Israel embed reporters and White
      House track. Date-interpolated URL — uses today's date.

  - id: cnbc_live
    name: "CNBC Live Blog (Energy)"
    tier: 2
    domains: [d3]
    method: scrape
    url: "https://www.cnbc.com/iran-war-live-updates-{YYYY-MM-DD}"
    enabled: true
    notes: >
      Primary live input for Energy/Economic domain (d3). Goldman Sachs
      analyst commentary, Brent crude, GasBuddy US pump prices.
      Date-interpolated URL.

  - id: nbc_live
    name: "NBC News Live Blog"
    tier: 2
    domains: [d1]
    method: scrape
    url: "https://www.nbcnews.com/world/iran/live-blog-{YYYY-MM-DD}"
    enabled: true
    notes: >
      Satellite imagery verification via Maxar/Planet partners. Military
      analyst network (Stavridis, Barry McCaffrey). Date-interpolated URL.

  - id: cbs_live
    name: "CBS News Live Blog"
    tier: 2
    domains: [d4]
    method: scrape
    url: "https://www.cbsnews.com/live-updates/iran-war-{YYYY-MM-DD}"
    enabled: true
    notes: "State Department sourcing. Foggy Bottom track."

  - id: france24_en
    name: "France 24 English"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://www.france24.com/en/rss"
    enabled: true
    notes: >
      EU Council dynamics, French government positioning. Best European
      institutional sourcing in the stack.

  - id: france24_observers
    name: "France 24 Observers"
    tier: 2
    domains: [d2, d5]
    method: rss
    url: "https://observers.france24.com/en/rss"
    enabled: true
    notes: >
      Video authentication unit. Use for hacktivist claim verification in
      Cyber (d5) and escalation imagery cross-check.

  - id: rfi_en
    name: "RFI English"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://www.rfi.fr/en/rss"
    enabled: true

  - id: rfi_persian
    name: "RFI Persian"
    tier: 2
    domains: [d1, d2]
    method: rss
    url: "https://www.rfi.fr/fa/rss"
    enabled: true
    notes: >
      Separate ingestion stream (Persian-language). Primary inside-Iran
      supplement during communications blackout periods. Items flagged
      with lang=fa for downstream handling.

  - id: dw_en
    name: "Deutsche Welle"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://rss.dw.com/rdf/rss-en-all"
    enabled: true
    notes: >
      Russian and Chinese diplomatic positioning. NATO implications.
      Best European outlet for Sino-Russian reaction coverage.

  - id: haaretz
    name: "Haaretz"
    tier: 2
    domains: [d1, d4]
    method: scrape
    url: "https://www.haaretz.com/middle-east-news"
    enabled: true
    notes: >
      Only major Israeli outlet consistently critical of government policy.
      Essential for war-cabinet dissent and IDF internal disputes.
      Paywall — configure cookie auth if available.

  - id: iran_intl
    name: "Iran International"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.iranintl.com/en"
    enabled: true
    notes: >
      Inside-Iran footage via VPN contributors. Best source on IRGC
      internal dynamics and succession politics. Use for regime-stability
      signals in d2.

  - id: quincy_inst
    name: "Quincy / Responsible Statecraft"
    tier: 2
    domains: [d2]
    method: rss
    url: "https://responsiblestatecraft.org/feed/"
    enabled: true
    notes: >
      Restraint/de-escalation framing. Include to prevent hawkish-framing
      default. Should inform dissenter notes on escalation assumptions.

  - id: bbc_live
    name: "BBC Live Blog / Middle East"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://feeds.bbci.co.uk/news/world/middle_east/rss.xml"
    enabled: true

  - id: bbc_persian
    name: "BBC Persian"
    tier: 2
    domains: [d1]
    method: scrape
    url: "https://www.bbc.com/persian"
    enabled: true
    notes: >
      Persian-language BBC service. Ground-level reporting inside Iran.
      Parse headline feed only — full article extraction unreliable.

  - id: anadolu
    name: "Anadolu Agency"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://www.aa.com.tr/en/rss/default?cat=world"
    enabled: true
    notes: >
      Tehran bureau with ground imagery inside Iran. Turkish and
      Azerbaijani positioning. Useful for northern/Caucasus flank.

  - id: rudaw
    name: "Rudaw"
    tier: 2
    domains: [d1]
    method: rss
    url: "https://www.rudaw.net/english/rss.xml"
    enabled: true
    notes: >
      Only professional outlet with consistent ground coverage of Kurdistan
      Region of Iraq (KRI). Essential for proxy activity in northern Iraq.

  - id: al_jazeera_tracker
    name: "Al Jazeera Casualty Tracker"
    tier: 2
    domains: [d1]
    method: scrape
    url: "https://www.aljazeera.com/news/liveblog/iran-war-casualty-tracker"
    enabled: true
    notes: >
      Structured HTML table — most tractable daily scrape in the stack.
      Cross-reference against CENTCOM/IDF for corroboration. Gaza Ministry
      of Health figures are 'claimed'; IDF figures 'reported'.

  - id: kpler_blog
    name: "Kpler Tanker Intelligence"
    tier: 2
    domains: [d3]
    method: scrape
    url: "https://www.kpler.com/blog"
    enabled: true
    notes: >
      Vessel traffic and Hormuz transit flow data. Commercial API
      preferred if KPLER_API_KEY is configured; falls back to blog scraping.

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 3 — DOMAIN-SPECIFIC TRIGGERS
  # Pull only when trigger conditions are met; do not include in baseline run.
  # ─────────────────────────────────────────────────────────────────────────────

  - id: netblocks
    name: "NetBlocks Internet Observatory"
    tier: 3
    domains: [d5]
    method: scrape
    url: "https://netblocks.org"
    trigger: cyber_activity
    enabled: true
    notes: >
      Iran internet shutdown and throttling status. Pull daily; include in
      brief only when status changes from previous cycle. A blackout event
      is a mandatory inclusion regardless of novelty filter.

  - id: recorded_future
    name: "Recorded Future Research Blog"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.recordedfuture.com/research/feed"
    trigger: cyber_activity
    enabled: true
    notes: "Threat intel reports. Pull only on new publication."

  - id: cisa_advisories
    name: "CISA Cybersecurity Advisories"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
    trigger: cyber_activity
    enabled: true
    notes: "US government advisories. Attribution-grade claims only."

  - id: mandiant_blog
    name: "Mandiant / Google Threat Intel"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.mandiant.com/resources/blog/rss.xml"
    trigger: cyber_activity
    enabled: true
    notes: "Iranian APT attribution reports. Treat as 'reported' not 'confirmed'."

  - id: eia_weekly
    name: "EIA Weekly Petroleum Status"
    tier: 3
    domains: [d3]
    method: scrape
    url: "https://www.eia.gov/petroleum/supply/weekly/"
    trigger: energy_disruption
    schedule_hint: "Wednesday 10:30 ET"
    enabled: true
    notes: >
      US petroleum stockpile report. Pull Wednesday. Trigger if Brent
      moves >5% in 24h or UKMTO issues Hormuz advisory.

  - id: opec_statements
    name: "OPEC Press Releases"
    tier: 3
    domains: [d3]
    method: scrape
    url: "https://www.opec.org/opec_web/en/press_room/4567.htm"
    trigger: energy_disruption
    enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# EXCLUDED SOURCES
# Cite as official claims only (verification_status: "claimed").
# Never use as factual input. Never cite as corroboration.
# ─────────────────────────────────────────────────────────────────────────────

excluded:
  state_media_iranian:
    - "Tehran Times"
    - "PressTV"
    - "IRNA (Islamic Republic News Agency)"
    - "Mehr News Agency"
    - "Fars News Agency"
    - "Tasnim News Agency"
    policy: >
      Label Iranian state media claims as: "Iranian government asserts..."
      These outlets may be cited for official Iranian government positions
      but never as independent factual corroboration.

  raw_osint:
    - "Raw Twitter/X OSINT accounts (unvetted)"
    - "Telegram channels without editorial accountability"
    policy: >
      Do not ingest raw social media. France 24 Observers performs
      verification — use that layer instead.

  policy_advocacy:
    - "Foundation for Defense of Democracies (FDD) — policy framing"
    - "Long War Journal — policy framing"
    policy: >
      Event tracking from these outlets is usable as Tier 3 with
      appropriate hedging. Do not import their policy recommendations
      or escalation advocacy into the brief framing.
