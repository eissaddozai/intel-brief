# ═══════════════════════════════════════════════════════════════════════════════
# CSE INTEL BRIEF — SOURCE REGISTRY  (exhaustive, 2026-03)
# ═══════════════════════════════════════════════════════════════════════════════
#
# TIER DEFINITIONS
#   1 — Factual backbone. Items → verification_status: "confirmed"
#   2 — Analytical depth / context. Items → "reported"
#   3 — Domain-specific triggers. Items → "claimed"
#
# METHOD: rss | scrape | email
#
# STATUS (honest assessment as of 2026-03)
#   working  — confirmed functional, tested
#   likely   — real URL, untested in this environment (proxy-blocked sandbox)
#   paywall  — returns login/stub; disabled until cookie auth is implemented
#   removed  — documented below with reason; do not re-add
# ═══════════════════════════════════════════════════════════════════════════════

sources:

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 1 — FACTUAL BACKBONE
  # These are the evidentiary floor. AP + AJ + Reuters not reporting = unconfirmed.
  # ─────────────────────────────────────────────────────────────────────────────

  # ── AP NEWS — MAXIMUM COVERAGE ──
  # AP is the single most important wire. We hit every possible entry point.
  # The scraper tries each in order; deduplication happens at triage.

  - id: ap_wire
    name: "Associated Press — Middle East Hub"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: scrape
    url: "https://apnews.com/hub/middle-east"
    status: likely
    enabled: true
    notes: >
      Primary AP Middle East hub. All entries below are mandatory — every
      one is scraped independently every cycle. AP not reporting = unconfirmed.

  - id: ap_iran
    name: "Associated Press — Iran Hub"
    tier: 1
    domains: [d1, d2, d3, d4]
    method: scrape
    url: "https://apnews.com/hub/iran"
    status: likely
    enabled: true
    notes: >
      All Iran-tagged AP content including live update pages. This is where
      "Live updates: UAE accuses Iran of new drone and missile attacks..."
      type stories aggregate. MANDATORY — do not disable.

  - id: ap_iran_nuclear
    name: "Associated Press — Iran Nuclear"
    tier: 1
    domains: [d2, d4]
    method: scrape
    url: "https://apnews.com/hub/iran-nuclear"
    status: likely
    enabled: true
    notes: >
      AP Iran nuclear-specific hub. Captures IAEA coverage, enrichment
      updates, P5+1 diplomatic track. Separate from general Iran hub.

  - id: ap_israel_war
    name: "Associated Press — Israel War"
    tier: 1
    domains: [d1, d2, d4]
    method: scrape
    url: "https://apnews.com/hub/israel-hamas-war"
    status: likely
    enabled: true
    notes: >
      AP Israel war coverage hub. Captures northern front (Hezbollah),
      regional escalation, and Israeli military operations that feed
      directly into d1/d2.

  - id: ap_top_news
    name: "Associated Press — Top International"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: scrape
    url: "https://apnews.com/world-news"
    status: likely
    enabled: true
    notes: >
      Broadest AP catch-all — relevance filter drops non-Iran/Gulf items.
      Ensures we catch stories AP files under world-news but not under
      the Middle East hub specifically.

  - id: ap_rss
    name: "Associated Press — World News RSS"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: rss
    url: "https://apnews.com/world-news.rss"
    status: likely
    enabled: true
    notes: >
      New-format AP RSS endpoint. May or may not serve valid XML — kept
      as mandatory entry regardless. If it works, it catches stories
      faster than scraping hub pages.

  - id: ap_rsshub
    name: "Associated Press — RSSHub Proxy"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: rss
    url: "https://rsshub.app/apnews/topics/world-news"
    status: likely
    enabled: true
    notes: >
      Third-party RSSHub proxy for AP News. Community-maintained, updated
      frequently. Redundancy layer — if AP's own RSS is down, this
      usually still works.

  - id: ap_google_news_iran
    name: "AP via Google News — Iran"
    tier: 1
    domains: [d1, d2, d3, d4]
    method: rss
    url: "https://news.google.com/rss/search?q=site:apnews.com+iran&hl=en-US&gl=US&ceid=US:en"
    status: likely
    enabled: true
    notes: >
      Google News RSS proxy for AP Iran content. Bypasses AP's aggressive
      bot-blocking by using Google's indexed copies. Returns AP headlines
      and links. MANDATORY — this is the most reliable AP access method.

  - id: ap_google_news_mideast
    name: "AP via Google News — Middle East"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
