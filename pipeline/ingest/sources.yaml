    method: scrape
    url: "https://www.lmalloyds.com/LMA/Underwriting_Committees/Marine_Committees/LMA_JWC/JWC_war_listed_areas.aspx"
    status: likely
    enabled: true
    notes: >
      Authoritative JWC listed areas page. Any add/remove of a geographic
      zone immediately reprices war risk for all vessels transiting that area.
      Changes here are the single most significant signal for d6.

  - id: imo_circular
