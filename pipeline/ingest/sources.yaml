# ═══════════════════════════════════════════════════════════════════════════════
# CSE INTEL BRIEF — SOURCE REGISTRY  (exhaustive, 2026-03)
# ═══════════════════════════════════════════════════════════════════════════════
#
# TIER DEFINITIONS
#   1 — Factual backbone. Items → verification_status: "confirmed"
#   2 — Analytical depth / context. Items → "reported"
#   3 — Domain-specific triggers. Items → "claimed"
#
# METHOD: rss | scrape | email
#
# STATUS (honest assessment as of 2026-03)
#   working  — confirmed functional, tested
#   likely   — real URL, untested in this environment (proxy-blocked sandbox)
#   paywall  — returns login/stub; disabled until cookie auth is implemented
#   removed  — documented below with reason; do not re-add
# ═══════════════════════════════════════════════════════════════════════════════

sources:

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 1 — FACTUAL BACKBONE
  # These are the evidentiary floor. AP + AJ + Reuters not reporting = unconfirmed.
  # ─────────────────────────────────────────────────────────────────────────────

  - id: ap_wire
    name: "Associated Press"
    tier: 1
    domains: [d1, d2, d3, d4, d5]
    method: rss
    url: "https://feeds.apnews.com/rss/apf-intlnews"
    status: likely
    enabled: true
    notes: >
      Real AP international RSS feed. General world news — relevance filter
      at ingest drops non-Iran/Gulf items. AP not reporting = unconfirmed.

  - id: al_jazeera_en
    name: "Al Jazeera English"
    tier: 1
    domains: [d1, d2, d4]
    method: rss
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    status: likely
    enabled: true
    notes: >
      Real public RSS. Strong regional bureau including Tehran, Beirut,
      Gaza, Riyadh. Factual backbone for Arab-world perspective.

  - id: reuters_mideast
    name: "Reuters Middle East"
    tier: 1
    domains: [d1, d2, d3, d4]
    method: scrape
    url: "https://www.reuters.com/world/middle-east/"
    status: likely
    enabled: true
    notes: >
      Reuters killed their public RSS in 2020. Scraped with requests+BS4
      from the Middle East topic page. Static HTML — no JS rendering needed.
      Reuters is the second pillar of the factual backbone alongside AP.

  - id: ctpiw_evening
    name: "CTP-ISW Evening Report"
    tier: 1
    domains: [d1, d2]
    method: scrape
    url: "https://www.criticalthreats.org/analysis/iran-war-updates"
    status: likely
    enabled: true
    notes: >
      Primary backbone for Battlespace (d1). Every claim is footnoted.
      Evening report covers the full 24h operational picture.
      Scraped with requests+BS4 from article listing page.

  - id: iaea
    name: "IAEA Statements"
    tier: 1
    domains: [d2]
    method: rss
    url: "https://www.iaea.org/feeds/topstories.xml"
    status: working
    enabled: true
    notes: >
      Definitive source for Iranian nuclear compliance and inspector access.
      New IAEA statement = mandatory inclusion regardless of novelty filter.

  - id: centcom
    name: "CENTCOM Press Releases"
    tier: 1
    domains: [d1]
    method: scrape
    url: "https://www.centcom.mil/MEDIA/NEWS-ARTICLES/"
    status: likely
    enabled: true
    notes: >
      US government static HTML. Official floor for US strikes, force
      posture, and US casualty figures.

  - id: ukmto
    name: "UKMTO Maritime Bulletins"
    tier: 1
    domains: [d1, d3]
    method: scrape
    url: "https://www.ukmto.org/indian-ocean/recent-incidents"
    status: likely
    enabled: true
    notes: >
      No RSS. Definitive maritime incident record for Hormuz/Red Sea.
      Scrapes incident table daily.

  - id: idf_spokesperson
    name: "IDF Spokesperson"
    tier: 1
    domains: [d1]
    method: scrape
    url: "https://www.idf.il/en/mini-sites/idf-website/press-releases/"
    status: likely
    enabled: true
    notes: >
      Official IDF press releases. Primary source for Israeli casualty
      figures and strike assessments. Treat as 'confirmed' for Israeli
      military actions only.

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 2 — ANALYTICAL DEPTH
  # ─────────────────────────────────────────────────────────────────────────────

  - id: cfr_daily
    name: "CFR Daily News Brief"
    tier: 2
    domains: [d4]
    method: email
    schedule_hint: "06:00 ET"
    enabled: true
    notes: >
      Subscribe at cfr.org/daily-news-brief. Forward to monitored inbox.
      Best single input for Diplomatic (d4): UN, G7, multilateral positioning.

  - id: ctpiw_morning
    name: "CTP-ISW Morning Report"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.criticalthreats.org/analysis/iran-war-updates"
    status: likely
    enabled: true
    notes: >
      Same URL as evening report — scraper extracts most recent article.
      Lower priority. Use for overnight events predating previous evening run.

  - id: cnn_mideast
    name: "CNN Middle East"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "http://rss.cnn.com/rss/edition_middleeast.rss"
    status: likely
    enabled: true
    notes: >
      Real CNN RSS feed for Middle East edition. Israel embed reporters,
      White House track. General relevance filter applied at ingest.

  - id: cnbc_world
    name: "CNBC World News"
    tier: 2
    domains: [d3, d4]
    method: rss
    url: "https://www.cnbc.com/id/100727362/device/rss/rss.html"
    status: likely
    enabled: true
    notes: >
      Real CNBC world news RSS feed. Goldman Sachs analyst commentary,
      US market reactions to conflict events.

  - id: cnbc_energy
    name: "CNBC Energy"
    tier: 2
    domains: [d3]
    method: rss
    url: "https://www.cnbc.com/id/19832390/device/rss/rss.html"
    status: likely
    enabled: true
    notes: >
      Real CNBC energy RSS. Primary live input for Energy/Economic (d3).
      Brent crude, GasBuddy US pump prices, Goldman energy desk.

  - id: bbc_mideast
    name: "BBC Middle East"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://feeds.bbci.co.uk/news/world/middle_east/rss.xml"
    status: working
    enabled: true

  - id: nyt_world
    name: "New York Times World"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
    status: likely
    enabled: true
    notes: >
      Real NYT world RSS. Limited free articles but headlines and
      abstracts are available without subscription. Relevance-filtered.

  - id: guardian_mideast
    name: "The Guardian Middle East"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://www.theguardian.com/world/middleeast/rss"
    status: likely
    enabled: true
    notes: "Real Guardian RSS for Middle East section. Good for UK/EU framing."

  - id: times_of_israel
    name: "Times of Israel"
    tier: 2
    domains: [d1, d2, d4]
    method: rss
    url: "https://www.timesofisrael.com/feed/"
    status: likely
    enabled: true
    notes: >
      Real Times of Israel RSS. English-language Israeli daily.
      Closest to IDF-side granular reporting short of Haaretz.
      No paywall — full article content in feed.

  - id: jerusalem_post
    name: "Jerusalem Post"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://www.jpost.com/rss/rssfeedsfrontpage.aspx"
    status: likely
    enabled: true
    notes: "Real JPost RSS. Useful for Israeli government and military statements."

  - id: middle_east_eye
    name: "Middle East Eye"
    tier: 2
    domains: [d1, d2, d4]
    method: rss
    url: "https://www.middleeasteye.net/rss"
    status: likely
    enabled: true
    notes: >
      Independent outlet with strong Gulf and Iran bureau. Good on
      Houthi operational reporting and GCC internal politics.

  - id: france24_en
    name: "France 24 English"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://www.france24.com/en/rss"
    status: working
    enabled: true
    notes: "EU Council dynamics, French government positioning."

  - id: france24_observers
    name: "France 24 Observers"
    tier: 2
    domains: [d2, d5]
    method: rss
    url: "https://observers.france24.com/en/rss"
    status: likely
    enabled: true
    notes: "Video authentication. Use for hacktivist claim verification."

  - id: dw_en
    name: "Deutsche Welle"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://rss.dw.com/rdf/rss-en-all"
    status: working
    enabled: true
    notes: "Russian and Chinese diplomatic positioning. NATO implications."

  - id: rfi_en
    name: "RFI English"
    tier: 2
    domains: [d4]
    method: rss
    url: "https://www.rfi.fr/en/rss"
    status: likely
    enabled: true

  - id: rfi_persian
    name: "RFI Persian"
    tier: 2
    domains: [d1, d2]
    method: rss
    url: "https://www.rfi.fr/fa/rss"
    status: likely
    enabled: true
    notes: "Persian-language. Primary inside-Iran supplement during blackouts."

  - id: anadolu
    name: "Anadolu Agency"
    tier: 2
    domains: [d1, d4]
    method: rss
    url: "https://www.aa.com.tr/en/rss/default?cat=world"
    status: likely
    enabled: true
    notes: "Turkish positioning, Caucasus/northern flank, Tehran bureau."

  - id: rudaw
    name: "Rudaw"
    tier: 2
    domains: [d1]
    method: rss
    url: "https://www.rudaw.net/english/rss.xml"
    status: likely
    enabled: true
    notes: "Ground coverage of Kurdistan Region of Iraq. Proxy activity."

  - id: icg
    name: "International Crisis Group"
    tier: 2
    domains: [d2, d4]
    method: rss
    url: "https://www.crisisgroup.org/rss.xml"
    status: likely
    enabled: true
    notes: "Ali Vaez escalation framing. Best public voice on Iranian decision-making."

  - id: quincy_inst
    name: "Responsible Statecraft"
    tier: 2
    domains: [d2]
    method: rss
    url: "https://responsiblestatecraft.org/feed/"
    status: likely
    enabled: true
    notes: "Restraint framing. Include to prevent hawkish-framing default."

  - id: alma_research
    name: "Alma Research"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://israel-alma.org/category/reports/"
    status: likely
    enabled: true
    notes: >
      IDF-side operational depth. Best public source on northern front
      (Hezbollah) order of battle. WordPress category page, BS4 scrape.

  - id: iran_intl
    name: "Iran International"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.iranintl.com/en"
    status: likely
    enabled: true
    notes: >
      Inside-Iran footage and IRGC internal dynamics. Homepage scrape.
      May return partial content if JS-rendered; we take what's available.

  - id: bbc_persian
    name: "BBC Persian"
    tier: 2
    domains: [d1, d2]
    method: scrape
    url: "https://www.bbc.com/persian"
    status: likely
    enabled: true
    notes: "Persian-language BBC. Static headline extraction."

  - id: haaretz
    name: "Haaretz"
    tier: 2
    domains: [d1, d4]
    method: scrape
    url: "https://www.haaretz.com/middle-east-news"
    status: paywall
    enabled: false
    notes: >
      Hard paywall — returns login page without auth cookies. Disabled.
      Essential for war-cabinet dissent and IDF internal disputes.
      Re-enable after implementing cookie auth.

  # ─────────────────────────────────────────────────────────────────────────────
  # TIER 3 — DOMAIN-SPECIFIC TRIGGERS
  # ─────────────────────────────────────────────────────────────────────────────

  - id: recorded_future
    name: "Recorded Future Research Blog"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.recordedfuture.com/research/feed"
    trigger: cyber_activity
    status: likely
    enabled: true
    notes: "Threat intel reports. Pull on new publication."

  - id: cisa_advisories
    name: "CISA Cybersecurity Advisories"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
    trigger: cyber_activity
    status: working
    enabled: true
    notes: "US government advisories. Attribution-grade claims only."

  - id: mandiant_blog
    name: "Mandiant / Google Threat Intel"
    tier: 3
    domains: [d5]
    method: rss
    url: "https://www.mandiant.com/resources/blog/rss.xml"
    trigger: cyber_activity
    status: likely
    enabled: true
    notes: "Iranian APT attribution. Treat as 'reported' not 'confirmed'."

  - id: netblocks
    name: "NetBlocks Internet Observatory"
    tier: 3
    domains: [d5]
    method: scrape
    url: "https://netblocks.org"
    trigger: cyber_activity
    status: likely
    enabled: true
    notes: "Iran internet shutdown/throttling. Include only when status changes."

  - id: eia_weekly
    name: "EIA Weekly Petroleum Status"
    tier: 3
    domains: [d3]
    method: scrape
    url: "https://www.eia.gov/petroleum/supply/weekly/"
    trigger: energy_disruption
    schedule_hint: "Wednesday 10:30 ET"
    status: likely
    enabled: true
    notes: "US petroleum stockpile report. Trigger if Brent moves >5% / 24h."

  - id: opec_statements
    name: "OPEC Press Releases"
    tier: 3
    domains: [d3]
    method: scrape
    url: "https://www.opec.org/opec_web/en/press_room/4567.htm"
    trigger: energy_disruption
    status: likely
    enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# REMOVED SOURCES — documented, do not re-add
# ─────────────────────────────────────────────────────────────────────────────
# reuters_rss — feeds.reuters.com/reuters/worldNews
#   Reuters removed all public RSS feeds in 2020. 404s. Replaced by
#   reuters_mideast scrape of reuters.com/world/middle-east/.
#
# cnn_live  — cnn.com/world/live-news/iran-war-{YYYY-MM-DD}
# cnbc_live — cnbc.com/iran-war-live-updates-{YYYY-MM-DD}
# nbc_live  — nbcnews.com/world/iran/live-blog-{YYYY-MM-DD}
# cbs_live  — cbsnews.com/live-updates/iran-war-{YYYY-MM-DD}
#   All four: fabricated URL slug patterns. These specific daily live-blog
#   URLs do not exist. Replaced by CNN/CNBC real RSS feeds above.
#
# al_jazeera_tracker — aljazeera.com/news/liveblog/iran-war-casualty-tracker
#   Speculative campaign-specific URL. Replaced by al_jazeera_en RSS.
#
# kpler_blog — kpler.com/blog
#   JS-rendered, blank page without headless browser. Removed.

# ─────────────────────────────────────────────────────────────────────────────
# EXCLUDED SOURCES
# ─────────────────────────────────────────────────────────────────────────────

excluded:
  state_media_iranian:
    names:
      - "Tehran Times"
      - "PressTV"
      - "IRNA (Islamic Republic News Agency)"
      - "Mehr News Agency"
      - "Fars News Agency"
      - "Tasnim News Agency"
    policy: "Label as 'Iranian government asserts...' — never use as independent corroboration."

  raw_osint:
    names:
      - "Raw Twitter/X OSINT accounts (unvetted)"
      - "Telegram channels without editorial accountability"
    policy: "Do not ingest raw social media."

  policy_advocacy:
    names:
      - "Foundation for Defense of Democracies (FDD)"
      - "Long War Journal"
    policy: "Event tracking usable as Tier 3 with hedging. Not policy recommendations."
