name: Daily Intel Brief

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  schedule:
    # 06:00 UTC daily (01:00 ET / before morning briefing)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      force:
        description: 'Force re-run even if cache exists (staged mode only)'
        required: false
        default: 'false'
      mode:
        description: 'Pipeline mode: "agent" (agentic single pass) or "staged" (ingest→draft→output)'
        required: false
        default: 'agent'
      model:
        description: 'Claude model ID (agent mode only)'
        required: false
        default: 'claude-sonnet-4-6'

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  generate-brief:
    name: Generate brief (${{ github.event.inputs.mode || 'agent' }} mode)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so serialiser can number cycles correctly

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core dependencies
        run: pip install pyyaml requests

      # ── Claude Code CLI (agent mode only) ────────────────────────────────
      # agent_brief.py spawns `claude -p` subprocesses via subprocess.run.
      # Node.js ships with ubuntu-latest; this adds the claude CLI to PATH.
      - name: Install Claude Code CLI
        if: ${{ github.event.inputs.mode != 'staged' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Install staged-pipeline extras (staged mode only)
        if: ${{ github.event.inputs.mode == 'staged' }}
        run: pip install anthropic beautifulsoup4

      - name: Install Playwright (staged mode only)
        if: ${{ github.event.inputs.mode == 'staged' }}
        run: |
          pip install playwright
          playwright install chromium --with-deps
        continue-on-error: true

      # ── Agent mode (default) ──────────────────────────────────────────────
      - name: Run agentic brief
        if: ${{ github.event.inputs.mode != 'staged' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4-6' }}
        run: |
          # Export model so the commit step can include it in the message
          echo "USED_MODEL=$INPUT_MODEL" >> "$GITHUB_ENV"
          if [ -n "$INPUT_DATE" ]; then
            python pipeline/main.py agent --date "$INPUT_DATE" --model "$INPUT_MODEL"
          else
            python pipeline/main.py agent --model "$INPUT_MODEL"
          fi

      # ── Staged mode (legacy / explicit) ───────────────────────────────────
      - name: Run staged pipeline
        if: ${{ github.event.inputs.mode == 'staged' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CSE_EMAIL_USER: ${{ secrets.CSE_EMAIL_USER }}
          CSE_EMAIL_PASS: ${{ secrets.CSE_EMAIL_PASS }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          echo "USED_MODEL=staged" >> "$GITHUB_ENV"
          FORCE_ARG=""
          if [ "$INPUT_FORCE" = "true" ]; then
            FORCE_ARG="--force"
          fi
          if [ -n "$INPUT_DATE" ]; then
            python pipeline/main.py run --auto-approve --date "$INPUT_DATE" $FORCE_ARG
          else
            python pipeline/main.py run --auto-approve $FORCE_ARG
          fi

      - name: Render print-ready HTML (staged mode)
        if: ${{ github.event.inputs.mode == 'staged' }}
        run: python pipeline/main.py render

      # ── Commit ────────────────────────────────────────────────────────────
      - name: Commit and push new cycle
        run: |
          git config user.name  "Intel Brief Bot"
          git config user.email "bot@intel-brief"

          # Mirror latest cycle to src/data/ for the React SPA
          if [ -f cycles/latest.json ]; then
            cp cycles/latest.json src/data/latest.json
            LATEST=$(ls -t cycles/cycle*.json 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              cp "$LATEST" "src/data/$(basename "$LATEST")"
            fi
          fi

          git add cycles/ src/data/ briefs/
          if git diff --cached --quiet; then
            echo "No new cycle generated — nothing to commit"
          else
            CYCLE_DATE=$(date -u +%Y-%m-%d)
            git commit -m "cycle: ${CYCLE_DATE} — daily brief [${USED_MODEL:-claude-sonnet-4-6}]"
            git push origin main
          fi

      # ── Upload HTML as run artifact ────────────────────────────────────────
      - name: Upload HTML brief
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brief-${{ github.run_id }}
          path: briefs/
          retention-days: 90
