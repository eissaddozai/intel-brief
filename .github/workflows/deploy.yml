name: Deploy to GitHub Pages

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Fires on pushes to main that touch the React app, cycle data, or HTML briefs.
# Also fires whenever a new cycle is committed by the daily-brief workflow.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'cycles/**'
      - 'briefs/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build React SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Serve the static HTML briefs alongside the SPA at /briefs/
      - name: Copy HTML briefs into dist
        run: |
          if compgen -G "briefs/*.html" > /dev/null 2>&1; then
            mkdir -p dist/briefs
            cp briefs/*.html dist/briefs/
            echo "Copied $(ls briefs/*.html | wc -l) brief(s) to dist/briefs/"
          else
            echo "No HTML briefs to copy yet"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
